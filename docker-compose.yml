services:
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: keycloak-config-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: keycloak-config-keycloak
    command:
      - start-dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTPS_ENABLED: "true"
      KC_HTTPS_CERTIFICATE_FILE: /etc/keycloak/certs/server.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /etc/keycloak/certs/server.key
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "9443:8443"
    volumes:
      - ./certs:/etc/keycloak/certs:ro

volumes:
  postgres_data:
